<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Unity Web Player | Cyber Drifter</title>
<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="TemplateData/style.css">
<style>
/* === HTML OVERLAYS FOR PLAY/RESTART (bypass Unity UI) === */
#play-overlay, #gameover-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 0, 15, 0.85);
  z-index: 999999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  color: #00fff0;
  pointer-events: auto;
}
#play-overlay h1 {
  font-size: clamp(3rem, 10vw, 6rem);
  font-weight: 900;
  margin: 0 0 10px 0;
  background: linear-gradient(45deg, #ff00ff, #00fff0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 40px rgba(255,0,255,0.7);
  text-align: center;
}
#play-overlay p, #gameover-overlay p {
  color: #ff00ff;
  margin: 5px 0;
  font-size: 1.2rem;
  text-shadow: 0 0 20px rgba(255,0,255,0.7);
}
.play-btn-big, .restart-btn-big {
  margin-top: 30px;
  padding: 25px 80px;
  font-size: 2rem;
  font-weight: 900;
  color: #fff;
  background: linear-gradient(45deg, #ff00ff, #00fff0);
  border: 4px solid #00fff0;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-family: 'Courier New', monospace;
  clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%);
  box-shadow: 0 0 60px rgba(0,255,255,0.6), inset 0 0 40px rgba(255,0,255,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
  pointer-events: auto;
  position: relative;
  z-index: 9999999;
}
.play-btn-big:hover, .restart-btn-big:hover {
  transform: scale(1.05);
  box-shadow: 0 0 100px rgba(255,0,255,0.9);
}
.play-btn-big:active, .restart-btn-big:active {
  transform: scale(0.97);
  background: linear-gradient(45deg, #00fff0, #ff00ff);
}
.controls-info {
  margin-top: 25px;
  color: #88ccff;
  font-size: 0.95rem;
  text-align: center;
  line-height: 1.6;
}
.controls-info b { color: #00fff0; }
#gameover-overlay { display: none; }
#gameover-overlay h2 {
  font-size: 4rem;
  color: #ff0066;
  text-shadow: 0 0 40px #ff0066;
  margin: 0 0 20px 0;
  font-weight: 900;
}
.score-display {
  font-size: 1.8rem;
  color: #00fff0;
  margin: 10px 0;
  font-weight: bold;
}
.hi-display {
  font-size: 1.5rem;
  color: #ffcc00;
  margin: 5px 0 20px;
}
</style>
</head>
<body>
<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas" width=1024 height=768 tabindex="0"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
  <div id="unity-warning"> </div>
  <div id="unity-footer">
    <div id="unity-logo-title-footer"></div>
    <div id="unity-fullscreen-button"></div>
    <div id="unity-build-title">Cyber Drifter</div>
  </div>
</div>

<!-- PLAY OVERLAY: HTML puro, bypasea Unity UI -->
<div id="play-overlay">
  <h1>CYBER DRIFTER</h1>
  <p>// Endless Runner Cyberpunk //</p>
  <p style="color:#ffcc00;font-size:1.4rem;font-weight:bold;">HI: <span id="hi-score">0</span></p>
  <button id="play-btn" class="play-btn-big" type="button">▶  PLAY</button>
  <div class="controls-info">
    <b>A / D</b> Carril &nbsp;·&nbsp;
    <b>SPACE / W</b> Saltar &nbsp;·&nbsp;
    <b>S</b> Deslizar
  </div>
</div>

<!-- GAME OVER OVERLAY -->
<div id="gameover-overlay">
  <h2>GAME OVER</h2>
  <div class="score-display">SCORE: <span id="final-score">0</span></div>
  <div class="hi-display">HI: <span id="final-hi">0</span></div>
  <button id="restart-btn" class="restart-btn-big" type="button">↻  RESTART</button>
</div>

<script>
var unityInstance = null;
var canvas = document.querySelector("#unity-canvas");

function startGame() {
  if (unityInstance) {
    try {
      unityInstance.SendMessage("GameManager", "StartGameFromJS");
      document.getElementById("play-overlay").style.display = "none";
      canvas.focus();
    } catch (e) {
      console.error("SendMessage failed:", e);
    }
  }
}
function restartGame() {
  if (unityInstance) {
    try {
      unityInstance.SendMessage("GameManager", "RestartGameFromJS");
      document.getElementById("gameover-overlay").style.display = "none";
      canvas.focus();
    } catch (e) {
      console.error("SendMessage failed:", e);
    }
  }
}
document.getElementById("play-btn").addEventListener("click", startGame);
document.getElementById("restart-btn").addEventListener("click", restartGame);

function unityShowBanner(msg, type) {
  var warningBanner = document.querySelector("#unity-warning");
  function updateBannerVisibility() {
    warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
  }
  var div = document.createElement('div');
  div.innerHTML = msg;
  warningBanner.appendChild(div);
  if (type == 'error') div.style = 'background: red; padding: 10px;';
  else if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
  setTimeout(function() {
    warningBanner.removeChild(div);
    updateBannerVisibility();
  }, 5000);
  updateBannerVisibility();
}

var buildUrl = "Build";
var loaderUrl = buildUrl + "/WebGL.loader.js";
var config = {
  arguments: [],
  dataUrl: buildUrl + "/WebGL.data",
  frameworkUrl: buildUrl + "/WebGL.framework.js",
  codeUrl: buildUrl + "/WebGL.wasm",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "Aguitech",
  productName: "Cyber Drifter",
  productVersion: "1.0",
  showBanner: unityShowBanner,
};

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
  var meta = document.createElement('meta');
  meta.name = 'viewport';
  meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
  document.getElementsByTagName('head')[0].appendChild(meta);
  document.querySelector("#unity-container").className = "unity-mobile";
  canvas.className = "unity-mobile";
} else {
  canvas.style.width = "1024px";
  canvas.style.height = "768px";
}

document.querySelector("#unity-loading-bar").style.display = "block";

var script = document.createElement("script");
script.src = loaderUrl;
script.onload = () => {
  createUnityInstance(canvas, config, (progress) => {
    document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
  }).then((instance) => {
    unityInstance = instance;
    document.querySelector("#unity-loading-bar").style.display = "none";
    document.querySelector("#unity-fullscreen-button").onclick = () => {
      instance.SetFullscreen(1);
    };
    try {
      var hi = localStorage.getItem("CyberDrifter_HI");
      if (hi) document.getElementById("hi-score").textContent = hi;
    } catch(e) {}
  }).catch((message) => {
    alert(message);
  });
};
document.body.appendChild(script);

window.addEventListener("message", function(e) {
  if (e.data && e.data.type === "gameover") {
    document.getElementById("final-score").textContent = Math.floor(e.data.score);
    document.getElementById("final-hi").textContent = Math.floor(e.data.hi);
    try { localStorage.setItem("CyberDrifter_HI", Math.floor(e.data.hi)); } catch(err){}
    document.getElementById("gameover-overlay").style.display = "flex";
  }
});
</script>
</body>
</html>
